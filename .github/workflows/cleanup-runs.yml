name: Cleanup old successful workflow runs

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Keep only the 10 most recent successful runs per workflow
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          KEEP: 10
        run: |
          gh api repos/$REPO/actions/workflows --paginate \
            --jq '.workflows[] | select(.state == "active") | .id' |
          while read workflow_id; do
            echo "Checking workflow $workflow_id"

            gh api "repos/$REPO/actions/workflows/$workflow_id/runs?status=success&per_page=100" --paginate \
              --jq '.workflow_runs | sort_by(.created_at) | reverse | .[].id' |
            tail -n +$((KEEP + 1)) |
            while read run_id; do
              echo "Deleting successful run $run_id"
              gh api -X DELETE "repos/$REPO/actions/runs/$run_id"
            done
          done
