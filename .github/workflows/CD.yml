name: CD

on:
  push:
    branches: ['dev', 'main']

permissions:
  id-token: write
  contents: read

jobs:
  resolve-env:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - name: Resolve environment from branch
        id: env
        run: |
          REF="${{ github.ref_name }}"
          case "$REF" in
            main) echo "environment=prod" >> "$GITHUB_OUTPUT" ;;
            test) echo "environment=test" >> "$GITHUB_OUTPUT" ;;
            dev)  echo "environment=dev"  >> "$GITHUB_OUTPUT" ;;
            *)    echo "::error::Unknown branch '$REF'"; exit 1 ;;
          esac

  build-container-app:
    needs: resolve-env
    uses: Deploy-Box/deploy-box-platform/.github/workflows/azure-docker-build-push.yml@dev
    with:
      image_name: deploy-box-container-app
      docker_context: ./Website
      environment: ${{ needs.resolve-env.outputs.environment }}
    permissions:
      id-token: write
      contents: read

  deploy-infrastructure:
    needs: [resolve-env, build-container-app]
    uses: Deploy-Box/deploy-box-platform/.github/workflows/terraform-deploy.yml@dev
    with:
      terraform_dir: ./terraform
      terraform_version: "1.9.x"
      extra_var_flags: '-var="image_name=${{ needs.build-container-app.outputs.image_name }}"'
      terraform_outputs: '["app_host","key_vault_name","database_name","database_port","database_host","database_user"]'
      environment: ${{ needs.resolve-env.outputs.environment }}
    permissions:
      id-token: write
      contents: read

  migrations:
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-env.outputs.environment }}
    needs: [resolve-env, deploy-infrastructure]
    permissions:
      id-token: write
      contents: read

    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Azure Login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Install dependencies
        working-directory: Website
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Check migrations
        working-directory: Website
        env:
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
        run: |
          source venv/bin/activate
          python manage.py makemigrations --check --dry-run --settings=core.settings.test
        
      - name: Run migrations
        working-directory: Website
        env:
          ENV: ${{ vars.ENV }}
          HOST: ${{ fromJson(needs.deploy-infrastructure.outputs.tf_outputs).app_host }}
          KEY_VAULT_NAME: ${{ fromJson(needs.deploy-infrastructure.outputs.tf_outputs).key_vault_name }}
          DB_NAME: ${{ fromJson(needs.deploy-infrastructure.outputs.tf_outputs).database_name }}
          DB_USER: deploy_box_cd
          DB_HOST: ${{ fromJson(needs.deploy-infrastructure.outputs.tf_outputs).database_host }}
          DB_PORT: ${{ fromJson(needs.deploy-infrastructure.outputs.tf_outputs).database_port }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          DEPLOY_BOX_GITHUB_TOKEN_KEY: ${{ secrets.DEPLOY_BOX_GITHUB_TOKEN_KEY }}
        run: |
          source venv/bin/activate
          python manage.py migrate