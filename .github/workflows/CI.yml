name: CI

on:
  pull_request:
    branches:
      - dev
      # - main

permissions:
  contents: read

jobs:
  verify-migrations:
    runs-on: ubuntu-latest
    name: Verify Database Migrations

    env:
      DJANGO_SECRET_KEY: "ci-test-secret-key-not-for-production"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Website/requirements.txt

      - name: Verify migrations can be created
        run: |
          cd Website
          python manage.py makemigrations --check --dry-run --settings=core.settings.test --verbosity=2
          echo "✅ Migration creation check passed"

      - name: Check for migration conflicts
        run: |
          cd Website
          python manage.py showmigrations --settings=core.settings.test --verbosity=2
          echo "✅ Migration conflict check passed"

      - name: Validate migration files
        run: |
          cd Website
          python manage.py check --settings=core.settings.test
          echo "✅ Django system check passed"

      - name: Test migration plan
        run: |
          cd Website
          python manage.py migrate --run-syncdb --settings=core.settings.test --verbosity=2
          echo "✅ Migration execution test passed"

  run-tests:
    runs-on: ubuntu-latest
    name: Run Tests

    env:
      CI: "true"
      DJANGO_SECRET_KEY: "ci-test-secret-key-not-for-production"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('Website/requirements*.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Website/requirements.txt

      - name: Run tests
        working-directory: Website
        run: python manage.py test accounts.tests payments.tests stacks.tests --settings=core.settings.test --verbosity 2 --no-input

