services:
  postgres:
    image: postgres:16
    container_name: postgres-db
    environment:
      POSTGRES_USER: deploy_box_website
      POSTGRES_PASSWORD: localdevpassword
      POSTGRES_DB: deploy_box_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: