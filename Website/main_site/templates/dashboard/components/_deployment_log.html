<!-- Deployment Log Viewer -->
<section id="deployment-log-section" class="mb-8" style="display: none;">
  <div class="bg-zinc-900 shadow-2xl rounded-lg border border-zinc-700 transition-all duration-300 overflow-hidden">
    <!-- Header -->
    <div class="flex items-center justify-between px-4 py-3 bg-zinc-800 border-b border-zinc-700">
      <div class="flex items-center space-x-3">
        <div class="flex space-x-1.5">
          <span class="w-3 h-3 rounded-full bg-red-500"></span>
          <span class="w-3 h-3 rounded-full bg-yellow-500"></span>
          <span class="w-3 h-3 rounded-full bg-green-500"></span>
        </div>
        <h2 class="text-sm font-semibold text-zinc-300 flex items-center">
          <svg class="w-4 h-4 mr-1.5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
          <span id="log-title">Deployment Log</span>
        </h2>
      </div>
      <div class="flex items-center space-x-3">
        <span id="log-status-badge" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium"></span>
        <button id="log-toggle-btn" class="text-zinc-400 hover:text-white transition-colors" title="Toggle log viewer">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Log Content -->
    <div id="log-content-wrapper">
      <div id="log-output" class="p-4 font-mono text-sm text-zinc-300 overflow-y-auto max-h-96 min-h-[120px] leading-relaxed whitespace-pre-wrap"></div>
      <!-- Scroll-to-bottom hint -->
      <div id="log-scroll-hint" class="hidden px-4 py-1.5 bg-zinc-800 border-t border-zinc-700 text-center">
        <button id="log-scroll-btn" class="text-xs text-emerald-400 hover:text-emerald-300 transition-colors">
          ↓ New output available — click to scroll down
        </button>
      </div>
    </div>
  </div>
</section>
