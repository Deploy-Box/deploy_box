{% comment %}
Page Header Component
Usage: include 'dashboard/components/_page_header.html' with title='Page Title' subtitle='Page subtitle text'
Parameters:
  - title: The main heading text (required)
  - subtitle: The subheading text (required)
{% endcomment %}
<header class="bg-zinc-950 pt-16 pb-24 text-center">
    <h1 class="text-2xl font-bold text-gray-100 mb-2">{{ title }}</h1>
    <p class="text-md text-gray-100 max-w-2xl mx-auto">
        {{ subtitle }}
    </p>
</header>
